<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz dos Presentes</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    min-height:100vh;
    background:#141414;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.quiz-container{
    width:100%;
    max-width:800px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:40px;
    backdrop-filter:blur(10px);
}

.netflix{
    color:#E50914;
    font-weight:800;
    letter-spacing:6px;
    margin-bottom:20px;
}

.progress{
    width:100%;
    height:8px;
    background:#333;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:30px;
}

.progress-bar{
    width:20%;
    height:100%;
    background:#E50914;
    transition:.4s;
}

.question-number{
    color:#aaa;
    margin-bottom:15px;
}

.question{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.answers{
    display:grid;
    gap:15px;
}

.answer{
    padding:18px;
    border:2px solid rgba(255,255,255,.1);
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

.answer:hover{
    border-color:#E50914;
    background:rgba(229,9,20,.15);
}

.answer.selected{
    border-color:#E50914;
    background:rgba(229,9,20,.25);
}

.btn{
    margin-top:30px;
    background:#E50914;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
    display:none;
}

.btn:hover{
    opacity:.9;
}

body{
    position:relative;
    overflow-x:hidden;
}

/* Vinheta nas bordas */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(
        circle,
        transparent 50%,
        rgba(0,0,0,.25) 75%,
        rgba(0,0,0,.65) 100%
    );
    pointer-events:none;
    z-index:999;
}

/* Linhas de TV */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(255,255,255,.03) 3px
    );
    pointer-events:none;
    z-index:998;
}

/* Ruído da tela */
.tv-noise{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:997;
    opacity:.05;
    background-image:
    repeating-radial-gradient(
        circle at center,
        white 0px,
        transparent 1px
    );
    animation:noise .15s infinite;
}

/* Tremulação suave */
@keyframes noise{
    0%{transform:translate(0,0);}
    20%{transform:translate(-1px,1px);}
    40%{transform:translate(1px,-1px);}
    60%{transform:translate(-1px,0);}
    80%{transform:translate(1px,1px);}
    100%{transform:translate(0,0);}
}

/* Brilho vermelho Netflix */
.netflix{
    text-shadow:
    0 0 10px rgba(229,9,20,.6),
    0 0 20px rgba(229,9,20,.4);
}

/* Efeito nas capas */
.presente{
    box-shadow:
    0 10px 30px rgba(0,0,0,.4);
}

.presente:hover{
    transform:scale(1.05);
    box-shadow:
    0 15px 40px rgba(229,9,20,.25);
}

</style>
</head>
<body>

<div class="quiz-container">

    <div class="netflix">QUIZ DOS PRESENTES</div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="question-number" id="questionNumber">
        Pergunta 1 de 5
    </div>

    <div class="question" id="question"></div>

    <div class="answers" id="answers"></div>

    <button class="btn" id="nextBtn">
        Próxima Pergunta →
    </button>

</div>

<script>
const quiz = [
{
    question: "Qual é a sua cor favorita?",
    answers: [
        "Azul",
        "Rosa",
        "Roxo",
        "Verde"
    ]
},
{
    question: "Qual é seu filme favorito?",
    answers: [
        "Velozes e Furiosos",
        "Hora do Rush",
        "Como Eu Era Antes de Você",
        "As Branquelas"
    ]
},
{
    question: "Qual dessas opções você escolheria?",
    answers: [
        "Chocolate",
        "Flores",
        "Roupas",
        "Algo feito à mão"
    ]
},
{
    question: "Qual palavra combina mais com você?",
    answers: [
        "Carinhosa",
        "Amorosa",
        "Insuperável",
        "Majestosa"
    ]
},
{
    question: "O que mais combina com você?",
    answers: [
        "Romântica",
        "Divertida",
        "Companheira",
        "Um pouco de tudo"
    ]
},
{
    question: "Está preparada para descobrir seu presente?",
    answers: [
        "Com certeza!",
        "Mostra logo João Vitor!",
        "Mostra logo meu amor!",
        "Quero nada seu cearense, brincadeira!"
    ]
}
];

let currentQuestion = 0;
let selected = null;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const progressBar = document.getElementById("progressBar");
const questionNumber = document.getElementById("questionNumber");

function loadQuestion(){

    selected = null;
    nextBtn.style.display = "none";

    questionNumber.textContent =
    `Pergunta ${currentQuestion+1} de ${quiz.length}`;

    questionEl.textContent =
    quiz[currentQuestion].question;

    answersEl.innerHTML = "";

    quiz[currentQuestion].answers.forEach(answer => {

        const div = document.createElement("div");
        div.classList.add("answer");
        div.textContent = answer;

        div.onclick = () => {

            document
            .querySelectorAll(".answer")
            .forEach(a => a.classList.remove("selected"));

            div.classList.add("selected");

            selected = answer;
            nextBtn.style.display = "inline-block";
        };

        answersEl.appendChild(div);
    });

    progressBar.style.width =
    `${((currentQuestion+1)/quiz.length)*100}%`;
}

nextBtn.onclick = () => {

    currentQuestion++;

    if(currentQuestion < quiz.length){
        loadQuestion();
    }else{

    document.querySelector(".quiz-container").innerHTML = `
        <h1 style="color:#E50914;margin-bottom:20px;">
            Analisando respostas...
        </h1>

        <p style="color:#ccc;">
            Verificando...
        </p>

        <div style="
            width:100%;
            height:10px;
            background:#333;
            border-radius:50px;
            margin-top:30px;
            overflow:hidden;">
            <div id="fakeBar" style="
                width:0%;
                height:100%;
                background:#E50914;
                transition:4s linear;">
            </div>
        </div>
    `;

    setTimeout(() => {
        document.getElementById("fakeBar").style.width = "100%";
    }, 100);

    setTimeout(() => {
        window.location.href = "resultadopresentes.html";
    }, 4500);
}
};

loadQuestion();
</script>

</body>
</html>
